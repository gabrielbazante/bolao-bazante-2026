name: Cron · check-fixtures

# Polls wc2026api.com and scores any finished matches.
# Every 5 minutes. The handler uses a smart-poll window (kickoff ±window):
# if no fixture is active it returns immediately without calling the API,
# so running this frequently costs ~0 quota on idle days and ~36 req/day
# during active match days — well within the Pro tier (500 req/day).

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # allow manual trigger from the Actions tab

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/check-fixtures
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sS -f -X GET "$APP_URL/api/cron/check-fixtures" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 60
